<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Abinaya S</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .page-content { padding: 50px 0; }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1.4fr;
      gap: 30px;
      align-items: start;
    }

    @media (max-width: 700px) {
      .contact-grid { grid-template-columns: 1fr; }
    }

    .contact-info h3 {
      font-size: 1.1rem;
      color: #0073e6;
      margin-bottom: 20px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 20px;
    }

    .contact-item .icon {
      width: 42px;
      height: 42px;
      background: #e6f0ff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #0073e6;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .contact-item .detail .label {
      font-size: 0.8rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .contact-item .detail a,
    .contact-item .detail span {
      display: block;
      color: #222;
      font-weight: 500;
      text-decoration: none;
      font-size: 0.95rem;
    }

    .contact-item .detail a:hover { color: #0073e6; }

    .social-row { display: flex; gap: 12px; margin-top: 24px; }

    .social-row a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border: 2px solid #0073e6;
      border-radius: 50%;
      color: #0073e6;
      font-size: 1rem;
      text-decoration: none;
      transition: all 0.3s;
    }

    .social-row a:hover {
      background: #0073e6;
      color: #fff;
    }

    /* Form */
    .contact-form h3 {
      font-size: 1.1rem;
      color: #0073e6;
      margin-bottom: 20px;
    }

    form { display: flex; flex-direction: column; gap: 14px; }

    input, textarea {
      padding: 12px 14px;
      border: 1.5px solid #dde3ec;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      transition: border 0.3s;
      background: #fafbfc;
    }

    input:focus, textarea:focus {
      border-color: #0073e6;
      outline: none;
      background: #fff;
    }

    textarea { min-height: 130px; resize: vertical; }

    button[type="submit"] {
      padding: 12px;
      background: #0073e6;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }

    button[type="submit"]:hover { background: #005bb5; }
  </style>
</head>
<body>

<header>
  <nav class="container">
    <div class="logo">Abinaya<span>.</span></div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="skills.html">Skills</a></li>
      <li><a href="projects.html">Projects</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
  </nav>
</header>

<main class="container page-content">
  <h2 class="section-title">Contact Me</h2>

  <div class="contact-grid">

    <!-- Contact Info -->
    <div class="card contact-info">
      <h3>Get In Touch</h3>

      <div class="contact-item">
        <div class="icon"><i class="fa-solid fa-envelope"></i></div>
        <div class="detail">
          <span class="label">Email</span>
          <a href="mailto:archanasenthil297@gmail.com">archanasenthil297@gmail.com</a>
        </div>
      </div>

      <div class="contact-item">
        <div class="icon"><i class="fa-solid fa-phone"></i></div>
        <div class="detail">
          <span class="label">Phone</span>
          <span>+91 63856 03574</span>
        </div>
      </div>

      <div class="contact-item">
        <div class="icon"><i class="fa-solid fa-location-dot"></i></div>
        <div class="detail">
          <span class="label">Location</span>
          <span>Coimbatore, Tamil Nadu, India</span>
        </div>
      </div>

      <div class="social-row">
        <a href="https://www.linkedin.com/in/abinayasenthilmururgan/" target="_blank" title="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
        <a href="https://github.com/Abi-2310" target="_blank" title="GitHub"><i class="fab fa-github"></i></a>
        <a href="https://leetcode.com/u/Abinaya_senthil23/" target="_blank" title="LeetCode"><i class="fa-solid fa-code"></i></a>
        <a href="https://www.hackerrank.com/" target="_blank" title="HackerRank"><i class="fab fa-hackerrank"></i></a>
      </div>
    </div>

    <!-- Contact Form -->
    <div class="card contact-form">
      <h3>Send a Message</h3>
      <form action="mailto:archanasenthil297@gmail.com" method="post" enctype="text/plain">
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Your Email" required>
        <input type="text" name="subject" placeholder="Subject" required>
        <textarea name="message" placeholder="Your Message" required></textarea>
        <button type="submit"><i class="fa-solid fa-paper-plane" style="margin-right:6px"></i>Send Message</button>
      </form>
    </div>

  </div>
</main>

</body>
</html>
