<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skills - Abinaya S</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: white;
      color: #000;
      font-family: Arial, sans-serif;
      line-height: 1.6;
    }

    /* Navbar */
    header {
      background: #f8f8f8;
      padding: 15px 0;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    nav.container {
      width: 90%;
      margin: auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      color: #333;
    }

    .logo span {
      color: #0073e6;
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 20px;
    }

    .nav-links a {
      text-decoration: none;
      color: #333;
      font-weight: 500;
      transition: color 0.3s;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: #0073e6;
    }

    /* Skills Page Styling */
    .skills-container {
      max-width: 900px;
      margin: 40px auto;
      padding: 40px;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      text-align: center;
    }

    .skills-container h2 {
      color: #0073e6;
      margin-bottom: 30px;
    }

    .circular-skills {
      display: flex;
      justify-content: center;
      gap: 50px;
      margin-bottom: 50px;
      flex-wrap: wrap;
    }

    .circle-item {
      text-align: center;
    }

    .circle-item p {
      margin-top: 10px;
      font-weight: 500;
      color: #333;
    }

    .circle {
      --percent: 0;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: conic-gradient(#0073e6 calc(var(--percent) * 1%), #e6e6e6 calc(var(--percent) * 1%));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      font-weight: bold;
      color: #000;
      position: relative;
    }

    .circle::before {
      content: "";
      position: absolute;
      width: 90px;
      height: 90px;
      background: #fff;
      border-radius: 50%;
    }

    .circle span {
      position: relative;
      z-index: 1;
    }

    /* Horizontal Bars */
    .bar-skill {
      text-align: left;
      margin-bottom: 20px;
    }

    .bar-label {
      margin-bottom: 5px;
      font-weight: bold;
      color: #333;
    }

    .bar {
      height: 10px;
      background: #e6e6e6;
      border-radius: 5px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #0073e6, #00b3b3);
      width: var(--width);
    }
  </style>
</head>
<body>

<!-- Navbar -->
<header>
  <nav class="container">
    <div class="logo">Portfolio<span>.</span></div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="skills.html" class="active">Skills</a></li>
      <li><a href="projects.html">Projects</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>
</header>

<!-- Skills Section -->
<section class="skills-container">
  <h2>Technical Skills</h2>
  <div class="circular-skills">
    <div class="circle-item">
      <div class="circle" style="--percent: 85"><span>85%</span></div>
      <p>Java</p>
    </div>
    <div class="circle-item">
      <div class="circle" style="--percent: 90"><span>90%</span></div>
      <p>Python</p>
    </div>
    <div class="circle-item">
      <div class="circle" style="--percent: 80"><span>80%</span></div>
      <p>HTML / CSS</p>
    </div>
  </div>

  <h2>Soft Skills</h2>
  <div class="bar-skill">
    <div class="bar-label">Problem Solving</div>
    <div class="bar"><div class="bar-fill" style="--width:85%"></div></div>
  </div>
  <div class="bar-skill">
    <div class="bar-label">Team Management</div>
    <div class="bar"><div class="bar-fill" style="--width:75%"></div></div>
  </div>
  <div class="bar-skill">
    <div class="bar-label">Communication</div>
    <div class="bar"><div class="bar-fill" style="--width:80%"></div></div>
  </div>
  <div class="bar-skill">
    <div class="bar-label">Project Success</div>
    <div class="bar"><div class="bar-fill" style="--width:90%"></div></div>
  </div>
</section>

</body>
</html>
